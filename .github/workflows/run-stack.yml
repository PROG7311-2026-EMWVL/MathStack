name: Run private stack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: latest
      GITHUB_OWNER_LC: ${{ github.repository_owner }}
      SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
      FirebaseMathApp: ${{ secrets.FirebaseMathApp }}
      MathAppJwtKey: ${{ secrets.MathAppJwtKey }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "GITHUB_OWNER_LC=${GITHUB_OWNER_LC,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: docker compose -f compose.ci.yml pull

      - name: Start stack
        run: docker compose -f compose.ci.yml up -d

      - name: Show running containers
        run: docker ps

      - name: Wait for database
        run: |
          for i in {1..36}; do
            if docker exec math-db /bin/bash -c "sqlcmd -S localhost -U sa -P '$SA_PASSWORD' -C -Q 'SELECT 1'" >/dev/null 2>&1; then
              echo "Database is ready"
              exit 0
            fi
            echo "Waiting for database..."
            sleep 5
          done
          echo "Database did not become ready"
          docker logs math-db || true
          exit 1

      - name: Wait for API port
        run: |
          for i in {1..36}; do
            if curl -fsS http://localhost:8081/ >/dev/null 2>&1; then
              echo "API responded on port 8081"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API did not respond"
          docker logs math-api || true
          exit 1

      - name: Wait for client port
        run: |
          for i in {1..36}; do
            if curl -fsS http://localhost:8082/ >/dev/null 2>&1; then
              echo "Client responded on port 8082"
              exit 0
            fi
            echo "Waiting for client..."
            sleep 5
          done
          echo "Client did not respond"
          docker logs math-client || true
          exit 1

      - name: Show logs if failure
        if: failure()
        run: |
          echo "===== DB LOGS ====="
          docker logs math-db || true
          echo "===== API LOGS ====="
          docker logs math-api || true
          echo "===== CLIENT LOGS ====="
          docker logs math-client || true

      - name: Stop stack
        if: always()
        run: docker compose -f compose.ci.yml down -v